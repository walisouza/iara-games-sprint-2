<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preferências – IARA</title>
  <link rel="icon" type="image/png" href="../imgs/favicon/favicon-96x96.png" sizes="96x96">
  <link rel="icon" type="image/svg+xml" href="../imgs/favicon/favicon.svg">
  <link rel="shortcut icon" href="../imgs/favicon/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="../imgs/favicon/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton+SC&family=Gabarito:wght@400..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="preferencias.css">
</head>
<body>

  <a href="../Index.html" class="voltar">Voltar</a>

  <form action="../Index.html" method="get">
  <main class="pref-wrapper">

    <!-- Coluna esquerda -->
    <section class="pref-left">
      <div class="greeting">
        <h1>Olá Rafael</h1>
        <p>Conte um pouco sobre você para personalizarmos<br>sua experiência.</p>
      </div>

      <div class="pref-block">
        <h3>Escolha seu estilo favorito</h3>
        <div class="tags-row">

          <label class="tag">
            <input type="checkbox" name="estilo" value="acao" checked>
            <span>Ação</span>
          </label>
          <label class="tag">
            <input type="checkbox" name="estilo" value="aventura">
            <span>Aventura</span>
          </label>
          <label class="tag">
            <input type="checkbox" name="estilo" value="esportes">
            <span>Esportes</span>
          </label>
          <label class="tag">
            <input type="checkbox" name="estilo" value="mundo-aberto" checked>
            <span>Mundo Aberto</span>
          </label>
          <label class="tag">
            <input type="checkbox" name="estilo" value="fps">
            <span>FPS</span>
          </label>
          <label class="tag">
            <input type="checkbox" name="estilo" value="estrategia">
            <span>Estratégia</span>
          </label>
          <label class="tag">
            <input type="checkbox" name="estilo" value="terror">
            <span>Terror</span>
          </label>
          <label class="tag">
            <input type="checkbox" name="estilo" value="simulacao">
            <span>Simulação</span>
          </label>
          <label class="tag">
            <input type="checkbox" name="estilo" value="luta">
            <span>Luta</span>
          </label>
          <label class="tag">
            <input type="checkbox" name="estilo" value="metroidvania">
            <span>Metroidvania</span>
          </label>
          <label class="tag">
            <input type="checkbox" name="estilo" value="jrpg">
            <span>JRPG</span>
          </label>
          <label class="tag">
            <input type="checkbox" name="estilo" value="rpg">
            <span>RPG</span>
          </label>
          <label class="tag">
            <input type="checkbox" name="estilo" value="arcade">
            <span>Arcade</span>
          </label>
          <label class="tag">
            <input type="checkbox" name="estilo" value="roguelike" checked>
            <span>Roguelike</span>
          </label>
          <label class="tag">
            <input type="checkbox" name="estilo" value="sobrevivencia">
            <span>Sobrevivência</span>
          </label>
          <label class="tag">
            <input type="checkbox" name="estilo" value="cartas">
            <span>Cartas</span>
          </label>
          <label class="tag">
            <input type="checkbox" name="estilo" value="tabuleiro">
            <span>Tabuleiro</span>
          </label>
          <label class="tag">
            <input type="checkbox" name="estilo" value="misterio">
            <span>Mistério</span>
          </label>
          <label class="tag">
            <input type="checkbox" name="estilo" value="plataforma">
            <span>Plataforma</span>
          </label>
          <label class="tag">
            <input type="checkbox" name="estilo" value="hack-slash">
            <span>Hack n' slash</span>
          </label>

        </div>
      </div>

      <div class="pref-block">
        <h3>Como você gosta de jogar?</h3>
        <div class="tags-row">

          <label class="tag">
            <input type="radio" name="modo" value="competitivo">
            <span>Competitivo</span>
          </label>
          <label class="tag">
            <input type="radio" name="modo" value="casual" checked>
            <span>Casual</span>
          </label>
          <label class="tag">
            <input type="radio" name="modo" value="multiplayer">
            <span>Multiplayer</span>
          </label>
          <label class="tag">
            <input type="radio" name="modo" value="singleplayer">
            <span>Singleplayer</span>
          </label>

        </div>
      </div>

      <button type="submit" class="btn-entrar">Entrar</button>
    </section>

    <!-- Coluna direita -->
    <section class="pref-right">
      <div class="avatar-header">
        <h2>Escolha sua foto de perfil</h2>
        <p>Personalize sua conta do seu jeito</p>
      </div>

      <div class="avatar-box">
        <h3>Escolha seu avatar</h3>
        <div class="avatar-grid">
          <label class="avatar-option"><input type="radio" name="avatar" value="1" required><span></span></label>
          <label class="avatar-option"><input type="radio" name="avatar" value="2"><span></span></label>
          <label class="avatar-option"><input type="radio" name="avatar" value="3"><span></span></label>
          <label class="avatar-option"><input type="radio" name="avatar" value="4"><span></span></label>
          <label class="avatar-option"><input type="radio" name="avatar" value="5"><span></span></label>
          <label class="avatar-option"><input type="radio" name="avatar" value="6"><span></span></label>
          <label class="avatar-option"><input type="radio" name="avatar" value="7"><span></span></label>
          <label class="avatar-option"><input type="radio" name="avatar" value="8"><span></span></label>
          <label class="avatar-option"><input type="radio" name="avatar" value="9"><span></span></label>
        </div>
      </div>
    </section>

  </main>
  </form>

</body>
</html>
